repos:
- repo: local
  hooks:
  - id: ruff-format
    name: ruff format
    entry: .venv/bin/ruff format
    language: system
    types: [python]

  - id: ruff-check
    name: ruff check
    entry: .venv/bin/ruff check --fix
    language: system
    types: [python]

  - id: ty
    name: ty
    entry: .venv/bin/ty check
    language: system
    files: ^src/
    types: [python]
    require_serial: true
